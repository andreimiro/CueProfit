name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - packages/profit-engine
          - services/api
          - services/workers
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: uv run --extra dev pytest

  web:
    name: Web typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cueprofit/web typecheck
      - name: Build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
        run: pnpm build

  migrations:
    name: Validate migrations + RLS
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: cueprofit
    steps:
      - uses: actions/checkout@v4
      - name: Create DB + Supabase shims
        run: |
          psql -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          create role anon nologin;
          create role authenticated nologin;
          create role service_role nologin bypassrls;
          create database cueprofit owner postgres;
          SQL
          psql -d cueprofit -v ON_ERROR_STOP=1 <<'SQL'
          create schema if not exists auth;
          create table auth.users (id uuid primary key default gen_random_uuid(), email text, raw_user_meta_data jsonb default '{}'::jsonb);
          create or replace function auth.uid() returns uuid language sql stable
            as $$ select nullif(current_setting('request.jwt.claim.sub', true), '')::uuid $$;
          grant usage on schema public to anon, authenticated, service_role;
          SQL
      - name: Apply migrations
        run: |
          for f in supabase/migrations/*.sql; do
            echo "--- $f"
            psql -d cueprofit -v ON_ERROR_STOP=1 -f "$f"
          done
