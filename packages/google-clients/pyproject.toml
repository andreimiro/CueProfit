[project]
name = "cueprofit-google-clients"
version = "0.0.0"
description = "CueProfit Google Ads + Merchant API clients, GAQL catalog, and result mappers"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8"]
ads = ["google-ads>=25"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/google_clients"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.uv]
package = true
